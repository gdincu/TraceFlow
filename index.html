<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceFlow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="controls">
    <div class="control-header">
        <h1 id="track-name">TraceFlow</h1>
        <button id="toggle-controls-btn" title="Toggle Controls" aria-label="Toggle control panel">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="playback-section">
        <input type="range" id="time-slider" aria-label="Playback position">

        <div class="slider-labels">
            <span id="elapsed-time">00:00:00</span>
            <span id="total-time">--:--:--</span>
        </div>

        <div class="btn-group">
            <button id="play-pause-btn" title="Play/Pause (Space)" aria-label="Play or pause">
                <i class="fas fa-play"></i>
            </button>
            <select id="speed-selector" title="Playback Speed">
                <option value="30" selected>30x</option>
                <option value="60">60x</option>
                <option value="120">120x</option>
            </select>
            <button id="load-btn" title="Open GPX file (or drag &amp; drop one anywhere)" aria-label="Open GPX file">
                <i class="fas fa-folder-open"></i>
            </button>
            <input type="file" id="file-input" accept=".gpx" hidden>
        </div>
    </div>

    <div id="marker-section">
        <label class="section-title">Marker</label>
        <div id="icon-row" role="group" aria-label="Marker icon"></div>
        <input type="file" id="icon-file-input" accept="image/*" hidden>
    </div>

    <div id="stats-grid">
        <div class="stat">
            <span class="stat-label">Distance</span>
            <span class="stat-value"><span id="stat-distance">0.0</span> / <span id="stat-total-distance">0.0</span> km</span>
        </div>
        <div class="stat">
            <span class="stat-label">Speed</span>
            <span class="stat-value"><span id="stat-speed">0</span> km/h</span>
        </div>
        <div class="stat">
            <span class="stat-label">Elevation</span>
            <span class="stat-value"><span id="stat-elevation">0</span> m</span>
        </div>
        <div class="stat">
            <span class="stat-label">Elevation gain</span>
            <span class="stat-value"><span id="stat-gain">0</span> m</span>
        </div>
    </div>

    <div id="elevation-profile">
        <svg id="elevation-svg" viewBox="0 0 400 90" preserveAspectRatio="none"></svg>
    </div>
    
    <div id="speed-profile">
        <svg id="speed-svg" viewBox="0 0 400 90" preserveAspectRatio="none"></svg>
    </div>
</div>

<div id="map"></div>
<div id="drop-overlay"><span>Drop GPX file to load</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="js/script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('TraceFlow Cache Active!'))
                .catch(err => console.error('Cache failed:', err));
        });
    }
</script>

</body>
</html>
